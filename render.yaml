# Render Blueprint — deploy backend from repo root:
# https://dashboard.render.com/blueprints → New Blueprint Instance → connect repo
#
# After deploy, set CORS_ALLOWED_ORIGINS to your Vercel URL, e.g.:
#   https://your-app.vercel.app

services:
  - type: web
    name: eld-trip-planner-api
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: bash build.sh
    startCommand: gunicorn config.wsgi:application --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    healthCheckPath: /api/health/
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings.prod
      - key: PYTHON_VERSION
        value: 3.12.5
      - key: DJANGO_DEBUG
        value: "False"
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_ALLOWED_HOSTS
        value: .onrender.com
      - key: CORS_ALLOWED_ORIGINS
        sync: false
